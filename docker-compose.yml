services:
  hub:
    build: .
    container_name: report-hub
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persisted user store (usernames + bcrypt hashes).
      - hub_data:/app/data

      # Edit reports (manifest + SQL files) without rebuilding the image.
      # Comment these out if you'd rather bake them into the image.
      - ./reports.toml:/app/reports.toml:ro
      - ./sql:/app/sql:ro

volumes:
  hub_data:
