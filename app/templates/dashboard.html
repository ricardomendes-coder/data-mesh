{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <div>
    <h1 style="margin:0;">{{ title }}</h1>
    <div class="muted">Signed in as {{ user }}</div>
  </div>
  <form method="post" action="{{ url_for('logout') }}">
    <button class="btn secondary" type="submit">Log out</button>
  </form>
</div>

{% if error %}<div class="error">{{ error }}</div>{% endif %}

<div class="card">
  <h1 style="font-size:1.1rem;">Predefined report</h1>
  <p class="muted">Run the report against the database and download the results.</p>
  <div class="row">
    <a class="btn" href="{{ url_for('export_report') }}?format=csv">Export CSV</a>
    <a class="btn secondary" href="{{ url_for('export_report') }}?format=xlsx">Export Excel</a>
  </div>
</div>
{% endblock %}
