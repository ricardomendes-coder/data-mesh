<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      --bg:#0f172a; --card:#1e293b; --fg:#e2e8f0; --muted:#94a3b8;
      --accent:#38bdf8; --border:#334155;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; background:var(--bg); color:var(--fg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .wrap { max-width: 960px; margin: 0 auto; padding: 2rem 1.25rem; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:1.5rem; }
    h1 { font-size:1.35rem; margin:0 0 1rem; }
    label { display:block; font-size:.85rem; color:var(--muted); margin-bottom:.35rem; }
    code { background:#0b1220; padding:.1rem .35rem; border-radius:5px; font-size:.85em; }
    input, textarea, select {
      width:100%; padding:.6rem .7rem; border-radius:8px; margin-bottom:1rem;
      border:1px solid var(--border); background:#0b1220; color:var(--fg);
    }
    textarea {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:.9rem; resize:vertical;
    }
    .report-row {
      display:flex; justify-content:space-between; align-items:center; gap:1rem;
      padding:.8rem 0; border-bottom:1px solid var(--border);
    }
    .report-row:last-child { border-bottom:none; }
    .tablewrap { overflow-x:auto; margin-top:1rem; border:1px solid var(--border); border-radius:8px; }
    table { border-collapse:collapse; width:100%; font-size:.85rem; }
    th, td {
      text-align:left; padding:.5rem .7rem; border-bottom:1px solid var(--border);
      white-space:nowrap;
    }
    th { position:sticky; top:0; background:#0b1220; color:var(--muted); font-weight:600; }
    tbody tr:last-child td { border-bottom:none; }
    .notice {
      background:#0b2a1d; border:1px solid #14532d; color:#bbf7d0;
      padding:.6rem .75rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem;
    }
    button, .btn {
      display:inline-block; padding:.6rem 1rem; border-radius:8px; cursor:pointer;
      border:1px solid var(--accent); background:var(--accent); color:#04222e;
      font-weight:600; text-decoration:none;
    }
    .btn.secondary { background:transparent; color:var(--accent); }
    .row { display:flex; gap:.75rem; flex-wrap:wrap; align-items:center; }
    .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
    .muted { color:var(--muted); font-size:.9rem; }
    .error {
      background:#4c1d1d; border:1px solid #7f1d1d; color:#fecaca;
      padding:.6rem .75rem; border-radius:8px; margin-bottom:1rem; font-size:.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
