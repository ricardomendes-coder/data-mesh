<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#FF5A00; --orange-hover:#FF752B; --orange-light:#FFF1E9; --orange-50:#FFF2EA;
      --navy:#00002D; --purple:#6D28D9;
      --title:#23252E; --body:#515669; --line:#898FA5;
      --bg-dark:#DDE1EC; --bg:#EAEBF0; --page:#F2F3F7;
      --ok:#28A745; --warn:#FFC107; --danger:#DC3545; --info:#17A2B8;
      --border:#E6E7EC;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;color:var(--title);background:var(--page);font-size:14px;-webkit-font-smoothing:antialiased;}
    code{font-family:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;font-size:.86em;background:rgba(0,0,45,.05);padding:.06rem .3rem;border-radius:4px;color:#3a1d6e;}
    a{color:var(--orange);text-decoration:none;}
    a:hover{color:var(--orange-hover);}

    /* ── shell ── */
    .bi-shell{display:flex;height:100vh;overflow:hidden;}
    .bi-side{width:64px;flex-shrink:0;transition:width .18s ease;overflow:hidden;}
    .bi-side:hover{width:224px;}
    .bi-side-inner{width:100%;height:100%;background:var(--navy);color:#fff;display:flex;flex-direction:column;overflow:hidden;}
    .bi-brand{display:flex;align-items:center;gap:.6rem;padding:1.05rem;border-bottom:1px solid rgba(255,255,255,.08);white-space:nowrap;}
    .bi-brand-mark{width:34px;height:34px;border-radius:8px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:1rem;flex-shrink:0;}
    .bi-brand-tx{line-height:1.1;opacity:0;transition:opacity .14s;}
    .bi-side:hover .bi-brand-tx{opacity:1;}
    .bi-brand-tx b{font-size:.95rem;font-weight:700;letter-spacing:-.01em;display:block;}
    .bi-brand-tx span{font-size:.66rem;color:rgba(255,255,255,.55);font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
    .bi-side-nav{padding:.7rem .6rem;display:flex;flex-direction:column;gap:2px;flex:1;}
    .bi-nav-item{display:flex;align-items:center;gap:.7rem;padding:.6rem;border-radius:9px;color:rgba(255,255,255,.72);font-size:.86rem;font-weight:500;cursor:pointer;transition:background .12s,color .12s;white-space:nowrap;border:none;background:transparent;font-family:inherit;text-align:left;width:100%;}
    .bi-side:not(:hover) .bi-nav-item{justify-content:center;}
    .bi-nav-item:hover{background:rgba(255,255,255,.07);color:#fff;}
    .bi-nav-item.active{background:var(--orange);color:#fff;font-weight:600;box-shadow:0 3px 10px rgba(255,90,0,.35);}
    .bi-nav-item svg{flex-shrink:0;opacity:.9;width:20px;}
    .bi-nav-item span{opacity:0;transition:opacity .14s;}
    .bi-side:not(:hover) .bi-nav-item span{display:none;}
    .bi-side:hover .bi-nav-item span{opacity:1;}
    .bi-conn-pill{margin:.6rem;padding:.55rem;border-radius:9px;background:rgba(255,255,255,.06);font-size:.72rem;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:.5rem;line-height:1.3;white-space:nowrap;overflow:hidden;}
    .bi-conn-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:var(--line);margin:0 auto;}
    .bi-side:hover .bi-conn-dot{margin:0;}
    .bi-conn-tx{opacity:0;transition:opacity .14s;overflow:hidden;text-overflow:ellipsis;}
    .bi-side:hover .bi-conn-tx{opacity:1;}
    .bi-conn-dot.on{background:#3ddc84;box-shadow:0 0 0 3px rgba(61,220,132,.2);}
    .bi-conn-dot.warn{background:var(--warn);}

    .bi-main{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--page);}
    .bi-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

    /* ── topbar ── */
    .bi-topbar{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1.05rem clamp(18px,3vw,34px);background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
    .bi-topbar-title{font-size:1.15rem;font-weight:700;color:var(--title);letter-spacing:-.01em;}
    .bi-topbar-sub{font-size:.8rem;color:var(--line);margin-top:.15rem;}
    .bi-topbar-actions{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}

    /* ── buttons ── */
    .bi-btn{display:inline-flex;align-items:center;gap:.4rem;height:36px;padding:0 15px;border:none;border-radius:8px;background:var(--orange);color:#fff;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:background .12s,border-color .12s,color .12s;white-space:nowrap;text-decoration:none;}
    .bi-btn:hover{background:var(--orange-hover);color:#fff;}
    .bi-btn.ghost{background:#fff;border:1px solid var(--border);color:var(--body);}
    .bi-btn.ghost:hover{border-color:#B6BDC9;background:#F9FAFB;color:var(--title);}
    .bi-btn.sm{height:30px;padding:0 11px;font-size:.78rem;}

    .bi-page{padding:clamp(18px,3vw,30px);}

    /* ── tabs (Query / Reports) ── */
    .bi-panel-tabs{display:flex;align-items:center;gap:.25rem;flex-wrap:wrap;margin-bottom:1.3rem;border-bottom:1px solid var(--border);}
    .bi-ptab{display:inline-flex;align-items:center;gap:.45rem;height:40px;padding:0 1rem;border:none;background:transparent;border-bottom:2px solid transparent;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--body);cursor:pointer;margin-bottom:-1px;transition:color .12s,border-color .12s;}
    .bi-ptab:hover{color:var(--title);}
    .bi-ptab.active{color:var(--orange);border-bottom-color:var(--orange);}
    .bi-ptab svg{flex-shrink:0;opacity:.9;}

    .pane{display:none;}
    .pane.active{display:block;}

    /* ── form fields ── */
    .bi-fld{margin-bottom:1rem;max-width:420px;}
    .bi-fld label{display:block;font-size:.74rem;font-weight:600;color:var(--body);margin-bottom:.35rem;}
    .bi-fld select,.bi-fld input{width:100%;height:38px;border:1px solid var(--border);border-radius:8px;padding:0 .7rem;font-family:inherit;font-size:.85rem;color:var(--title);background:#fff;outline:none;transition:border-color .12s,box-shadow .12s;}
    .bi-fld select:focus,.bi-fld input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,90,0,.15);}

    /* ── SQL editor ── */
    .bi-editor{border:1px solid var(--border);border-radius:11px;overflow:hidden;background:#fff;margin-bottom:1.2rem;}
    .bi-editor-bar{display:flex;align-items:center;gap:.5rem;padding:.45rem .6rem .45rem .8rem;background:#FAFAFB;border-bottom:1px solid #EFEFF3;flex-wrap:wrap;}
    .bi-editor-dot{width:8px;height:8px;border-radius:50%;background:#CBD2E0;}
    .bi-editor-tag{font-family:'IBM Plex Mono',monospace;font-size:.7rem;font-weight:600;color:var(--line);}
    .bi-editor-hint{font-size:.7rem;color:#B6BCC8;margin-left:.3rem;}
    @media(max-width:1050px){.bi-editor-hint{display:none;}}
    .bi-editor-bar .bi-btn:first-of-type{margin-left:auto;}
    .bi-ta{display:block;width:100%;min-height:190px;resize:vertical;border:0;outline:none;padding:.9rem 1rem;font-family:'IBM Plex Mono',monospace;font-size:.84rem;line-height:1.6;color:#1d2230;background:#fff;tab-size:2;white-space:pre;overflow:auto;}
    .bi-ta::placeholder{color:#A8AEBC;}

    /* ── result table ── */
    .bi-result-meta{font-size:.74rem;color:var(--line);margin-bottom:.6rem;font-variant-numeric:tabular-nums;}
    .bi-restbl-wrap{border:1px solid var(--border);border-radius:9px;overflow:auto;background:#fff;max-width:100%;}
    .bi-restbl{border-collapse:collapse;width:100%;font-size:.8rem;}
    .bi-restbl th{position:sticky;top:0;background:#F6F7F9;text-align:left;font-weight:600;color:var(--body);padding:.5rem .7rem;border-bottom:1px solid var(--border);white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:.72rem;z-index:1;}
    .bi-restbl td{padding:.45rem .7rem;border-bottom:1px solid #F2F3F6;color:#2b3040;white-space:nowrap;}
    .bi-restbl tbody tr:hover td{background:#FAFAFB;}
    .bi-restbl tbody tr:last-child td{border-bottom:none;}
    .bi-null{color:#B6BCC8;font-style:italic;font-size:.74rem;}

    /* ── alerts ── */
    .bi-err{display:flex;align-items:flex-start;gap:.55rem;background:#FFF6F0;border:1px solid #FBD9C2;border-radius:9px;padding:.75rem .95rem;font-size:.82rem;color:#9a3412;line-height:1.5;margin-bottom:1.1rem;}
    .bi-err svg{flex-shrink:0;margin-top:1px;color:#EA580C;}
    .bi-ok{background:#EAF7EE;border:1px solid #BFE6CA;border-radius:9px;padding:.65rem .95rem;font-size:.82rem;color:#0F5132;line-height:1.5;margin-bottom:1.1rem;}

    /* ── cards (reports) ── */
    .bi-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.9rem;}
    .bi-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.15rem;transition:all .14s;display:flex;flex-direction:column;}
    .bi-card:hover{border-color:#D1D5DB;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.06);}
    .bi-card-ic{width:40px;height:40px;border-radius:10px;background:var(--orange-light);color:var(--orange);display:flex;align-items:center;justify-content:center;margin-bottom:.75rem;}
    .bi-card-nm{font-size:1rem;font-weight:700;color:var(--title);margin-bottom:.3rem;line-height:1.25;}
    .bi-card-sub{font-size:.8rem;color:var(--line);line-height:1.5;margin-bottom:.9rem;}
    .bi-card-meta{display:flex;align-items:center;gap:.5rem;padding-top:.8rem;border-top:1px solid #F1F1F4;margin-top:auto;}
    .bi-empty-lg{padding:3rem 1rem;text-align:center;color:var(--line);font-size:.9rem;border:1px dashed var(--border);border-radius:12px;background:#fff;}

    /* ── login ── */
    .bi-login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:radial-gradient(1200px 600px at 50% -10%,#12123f 0%,var(--navy) 55%);}
    .bi-login-card{width:100%;max-width:380px;background:#fff;border-radius:16px;padding:2rem 1.9rem;box-shadow:0 24px 70px rgba(0,0,45,.45);}
    .bi-login-brand{display:flex;align-items:center;gap:.7rem;margin-bottom:1.5rem;}
    .bi-login-brand .bi-brand-mark{width:40px;height:40px;font-size:1.15rem;}
    .bi-login-brand b{font-size:1.05rem;font-weight:700;color:var(--title);display:block;line-height:1.1;}
    .bi-login-brand span{font-size:.68rem;color:var(--line);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
    .bi-login-h{font-size:1.05rem;font-weight:700;color:var(--title);margin-bottom:.35rem;}
    .bi-login-p{font-size:.82rem;color:var(--line);margin-bottom:1.4rem;}
    .bi-login .bi-fld{max-width:none;}
    .bi-login .bi-btn{width:100%;justify-content:center;height:42px;margin-top:.3rem;}
  </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
